name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ========================
      # Build Backend
      # ========================
      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app-backend:latest ./backend

      # ========================
      # Build Frontend
      # ========================
      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app-frontend:latest ./frontend

      # ========================
      # Login Docker Hub
      # ========================
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # ========================
      # Push images
      # ========================
      - name: Push Backend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/my-app-backend:latest

      - name: Push Frontend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/my-app-frontend:latest